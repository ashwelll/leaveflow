<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    LeaveFlow HRMS - Register
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:
        linear-gradient(
          135deg,
          #0f172a,
          #111827,
          #1e293b
        );

      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      overflow-x:hidden;
      padding:40px 0;
    }

    .background-circle{
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.25;
    }

    .circle1{
      width:300px;
      height:300px;
      background:#ef4444;
      top:-80px;
      left:-80px;
    }

    .circle2{
      width:350px;
      height:350px;
      background:#3b82f6;
      bottom:-100px;
      right:-100px;
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      align-items:center;
    }

    .left-section h1{
      font-size:4rem;
      line-height:1.1;
      margin-bottom:20px;
    }

    .left-section span{
      color:#ef4444;
    }

    .left-section p{
      color:#cbd5e1;
      line-height:1.8;
      font-size:1rem;
      max-width:500px;
      margin-bottom:30px;
    }

    .features{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
    }

    .feature-box{
      padding:12px 18px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;
      backdrop-filter:blur(10px);
      font-size:0.9rem;
    }

    .login-card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(18px);
      padding:40px;
      border-radius:24px;
      box-shadow:
        0 15px 40px rgba(0,0,0,0.3);
    }

    .login-card h2{
      text-align:center;
      margin-bottom:10px;
      font-size:2rem;
    }

    .login-card p{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:30px;
      font-size:0.95rem;
    }

    .form-row{
      display:flex;
      gap:15px;
    }

    .form-row .input-group{
      flex:1;
    }

    .input-group{
      margin-bottom:15px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      font-size:0.85rem;
      color:#e2e8f0;
    }

    .input-group input,
    .input-group select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:
        rgba(255,255,255,0.1);

      color:white;
      outline:none;
      font-size:0.9rem;
    }

    .input-group input::placeholder{
      color:#94a3b8;
    }

    select option{
      color:black;
    }

    .login-btn{
      width:100%;
      padding:14px;
      background:
        linear-gradient(
          to right,
          #ef4444,
          #dc2626
        );

      border:none;
      border-radius:14px;
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s ease;
      margin-top:15px;
    }

    .login-btn:hover{
      transform:translateY(-2px);

      box-shadow:
        0 8px 20px
        rgba(239,68,68,0.4);
    }

    .bottom-text{
      text-align:center;
      margin-top:20px;
      color:#cbd5e1;
      font-size:0.9rem;
    }

    .bottom-text a{
      color:#ef4444;
      text-decoration:none;
      font-weight:600;
    }

    @media(max-width:900px){

      .container{
        grid-template-columns:1fr;
        padding:30px 0;
      }

      .left-section{
        text-align:center;
      }

      .left-section p{
        margin:auto auto 30px;
      }

      .features{
        justify-content:center;
      }

      .left-section h1{
        font-size:3rem;
      }

      .form-row{
        flex-direction:column;
        gap:0;
      }

    }

  </style>

</head>

<body>

  <div class="background-circle circle1"></div>

  <div class="background-circle circle2"></div>

  <div class="container">

    <div class="left-section">

      <h1>
        Join<span>Flow</span><br>
        Today
      </h1>

      <p>
        Create your employee or manager account
        to access the LeaveFlow HRMS system.
      </p>

      <div class="features">

        <div class="feature-box">
          Quick Setup
        </div>

        <div class="feature-box">
          Secure Login
        </div>

        <div class="feature-box">
          HR Workflow
        </div>

      </div>

    </div>

    <div class="login-card">

      <h2>Create Account</h2>

      <p>
        Enter your details to continue
      </p>

      <form id="registerForm">

        <div class="input-group">

          <label>
            Full Name
          </label>

          <input
            type="text"
            id="fullname"
            placeholder="Enter full name"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Email Address
          </label>

          <input
            type="email"
            id="email"
            placeholder="Enter email"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Job Role
          </label>

          <select
            id="role"
            required
          >

            <option value="">
              Select Role
            </option>

            <option value="employee">
              Employee
            </option>

            <option value="manager">
              HR Manager
            </option>

          </select>

        </div>

        <div class="form-row">

          <div class="input-group">

            <label>
              Password
            </label>

            <input
              type="password"
              id="pass1"
              placeholder="Create password"
              required
            >

          </div>

          <div class="input-group">

            <label>
              Confirm Password
            </label>

            <input
              type="password"
              id="pass2"
              placeholder="Repeat password"
              required
            >

          </div>

        </div>

        <button
          class="login-btn"
          type="submit"
        >

          Register Account

        </button>

      </form>

      <div class="bottom-text">

        Already have an account?

        <a href="index.html">

          Login here

        </a>

      </div>

    </div>

  </div>

  <script>

    const registerForm =
      document.getElementById('registerForm');

    registerForm.addEventListener(
      'submit',
      async function(e){

        e.preventDefault();

        const full_name =
          document.getElementById('fullname').value;

        const email =
          document.getElementById('email').value;

        const role =
          document.getElementById('role').value;

        const password =
          document.getElementById('pass1').value;

        const confirmPassword =
          document.getElementById('pass2').value;

        if(password !== confirmPassword){

          alert(
            'Passwords do not match!'
          );

          return;

        }

        try{

          const response =
            await fetch(
              'http://localhost:5000/register',
              {

                method:'POST',

                headers:{
                  'Content-Type':
                    'application/json'
                },

                body:JSON.stringify({

                  full_name,
                  email,
                  role,
                  password

                })

              }
            );

          const data =
            await response.json();

          alert(data.message);

          if(data.message === 'Registration Successful'){

            window.location.href =
              'index.html';

          }

        }

        catch(error){

          console.log(error);

          alert(
            'Cannot connect to backend server'
          );

        }

      }
    );

  </script>

</body>
</html>
