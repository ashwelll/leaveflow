<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Employee Dashboard - LeaveFlow HRMS
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
    }

    .sidebar{
      width:260px;
      background:#111827;
      padding:30px 20px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border-right:
      1px solid rgba(255,255,255,0.1);
    }

    .logo{
      font-size:2rem;
      font-weight:700;
      margin-bottom:40px;
    }

    .logo span{
      color:#ef4444;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu a{
      text-decoration:none;
      color:#cbd5e1;
      padding:14px;
      border-radius:12px;
      transition:0.3s;
      font-weight:500;
      cursor:pointer;
    }

    .menu a:hover,
    .menu a.active{
      background:#ef4444;
      color:white;
    }

    .logout-btn{
      padding:14px;
      background:#dc2626;
      border:none;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    .logout-btn:hover{
      background:#b91c1c;
    }

    .main-content{
      flex:1;
      padding:30px;
      overflow-y:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .welcome h1{
      font-size:2rem;
    }

    .welcome p{
      color:#94a3b8;
      margin-top:5px;
    }

    .notification{
      position:relative;
      font-size:1.5rem;
    }

    .notification-badge{
      position:absolute;
      top:-5px;
      right:-8px;
      width:18px;
      height:18px;
      background:red;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:0.7rem;
      font-weight:600;
    }

    .cards{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:#1e293b;
      padding:25px;
      border-radius:20px;
      border:
      1px solid rgba(255,255,255,0.05);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h3{
      color:#cbd5e1;
      margin-bottom:10px;
      font-size:1rem;
    }

    .card h1{
      font-size:2rem;
    }

    .section{
      display:none;
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      margin-bottom:30px;
    }

    .section.active{
      display:block;
    }

    .section h2{
      margin-bottom:20px;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
      outline:none;
      font-size:1rem;
    }

    textarea{
      resize:none;
      height:120px;
    }

    .submit-btn{
      padding:14px 30px;
      background:#ef4444;
      border:none;
      border-radius:12px;
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .submit-btn:hover{
      background:#dc2626;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th,
    table td{
      padding:15px;
      text-align:left;
    }

    table th{
      color:#94a3b8;
      border-bottom:
      1px solid rgba(255,255,255,0.1);
    }

    table tr{
      border-bottom:
      1px solid rgba(255,255,255,0.05);
    }

    .status{
      padding:8px 14px;
      border-radius:20px;
      font-size:0.85rem;
      font-weight:600;
    }

    .pending{
      background:#facc15;
      color:black;
    }

    .approved{
      background:#22c55e;
    }

    .rejected{
      background:#ef4444;
    }

    .profile-box{
      background:#0f172a;
      padding:20px;
      border-radius:16px;
      line-height:2;
    }

    input[type="date"]::-webkit-calendar-picker-indicator{
      filter:invert(1);
      cursor:pointer;
    }

    .empty-message{
      text-align:center;
      color:#94a3b8;
      padding:20px;
    }

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
      }

      table{
        font-size:0.85rem;
      }

    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div>

      <div class="logo">
        Leave<span>Flow</span>
      </div>

      <div class="menu">

        <a
          class="menu-link active"
          data-section="dashboardSection"
        >
          Dashboard
        </a>

        <a
          class="menu-link"
          data-section="applySection"
        >
          Apply Leave
        </a>

        <a
          class="menu-link"
          data-section="historySection"
        >
          Leave History
        </a>

        <a
          class="menu-link"
          data-section="profileSection"
        >
          Profile
        </a>

      </div>

    </div>

    <button class="logout-btn">
      Logout
    </button>

  </div>

  <!-- MAIN -->

  <div class="main-content">

    <div class="topbar">

      <div class="welcome">

        <h1 id="welcomeText">
          Welcome 👋
        </h1>

        <p>
          Manage your leave applications easily.
        </p>

      </div>

      <div class="notification">

        🔔

        <div
          class="notification-badge"
          id="notificationCount"
        >
          0
        </div>

      </div>

    </div>

    <!-- DASHBOARD -->

    <div
      class="section active"
      id="dashboardSection"
    >

      <h2>
        Dashboard Overview
      </h2>

      <div class="cards">

        <div class="card">

          <h3>
            Total Leaves
          </h3>

          <h1 id="totalLeaves">
            0
          </h1>

        </div>

        <div class="card">

          <h3>
            Approved
          </h3>

          <h1 id="approvedLeaves">
            0
          </h1>

        </div>

        <div class="card">

          <h3>
            Pending
          </h3>

          <h1 id="pendingLeaves">
            0
          </h1>

        </div>

        <div class="card">

          <h3>
            Rejected
          </h3>

          <h1 id="rejectedLeaves">
            0
          </h1>

        </div>

      </div>

    </div>

    <!-- APPLY LEAVE -->

    <div
      class="section"
      id="applySection"
    >

      <h2>
        Apply For Leave
      </h2>

      <form id="leaveForm">

        <div class="form-group">

          <label>
            Leave Type
          </label>

          <select
            id="leaveType"
            required
          >

            <option value="">
              Select Leave Type
            </option>

            <option value="Sick Leave">
              Sick Leave
            </option>

            <option value="Casual Leave">
              Casual Leave
            </option>

            <option value="Emergency Leave">
              Emergency Leave
            </option>

          </select>

        </div>

        <div class="form-group">

          <label>
            From Date
          </label>

          <input
            type="date"
            id="fromDate"
            required
          >

        </div>

        <div class="form-group">

          <label>
            To Date
          </label>

          <input
            type="date"
            id="toDate"
            required
          >

        </div>

        <div class="form-group">

          <label>
            Reason
          </label>

          <textarea
            id="reason"
            placeholder="Enter leave reason..."
            required
          ></textarea>

        </div>

        <button
          type="submit"
          class="submit-btn"
        >

          Submit Leave Request

        </button>

      </form>

    </div>

    <!-- HISTORY -->

    <div
      class="section"
      id="historySection"
    >

      <h2>
        Leave History
      </h2>

      <table>

        <thead>

          <tr>

            <th>
              Leave Type
            </th>

            <th>
              From
            </th>

            <th>
              To
            </th>

            <th>
              Reason
            </th>

            <th>
              Status
            </th>

          </tr>

        </thead>

        <tbody id="leaveTableBody">

        </tbody>

      </table>

    </div>

    <!-- PROFILE -->

    <div
      class="section"
      id="profileSection"
    >

      <h2>
        Employee Profile
      </h2>

      <div class="profile-box">

        <p>
          <strong>Name:</strong>
          <span id="profileName"></span>
        </p>

        <p>
          <strong>Email:</strong>
          <span id="profileEmail"></span>
        </p>

        <p>
          <strong>Role:</strong>
          <span id="profileRole"></span>
        </p>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    const API =
      'http://localhost:5000';

    const user =
      JSON.parse(
        localStorage.getItem('user')
      );

    if(!user){

      window.location.href =
        'index.html';

    }

    /* USER DETAILS */

    document.getElementById(
      'welcomeText'
    ).innerHTML =
      `Welcome, ${user.full_name} 👋`;

    document.getElementById(
      'profileName'
    ).innerText =
      user.full_name;

    document.getElementById(
      'profileEmail'
    ).innerText =
      user.email;

    document.getElementById(
      'profileRole'
    ).innerText =
      user.role;

    /* MENU SWITCH */

    const menuLinks =
      document.querySelectorAll(
        '.menu-link'
      );

    const sections =
      document.querySelectorAll(
        '.section'
      );

    menuLinks.forEach((link) => {

      link.addEventListener(
        'click',
        function(){

          menuLinks.forEach((item) => {

            item.classList.remove(
              'active'
            );

          });

          sections.forEach((section) => {

            section.classList.remove(
              'active'
            );

          });

          link.classList.add(
            'active'
          );

          document.getElementById(
            link.dataset.section
          ).classList.add(
            'active'
          );

          if(
            link.dataset.section ===
            'historySection'
          ){

            loadLeaves();

          }

        }
      );

    });

    /* LOGOUT */

    document.querySelector(
      '.logout-btn'
    ).addEventListener(
      'click',
      function(){

        localStorage.removeItem(
          'user'
        );

        window.location.href =
          'index.html';

      }
    );

    /* DATE SETTINGS */

    const today =
      new Date()
      .toISOString()
      .split('T')[0];

    document.getElementById(
      'fromDate'
    ).min = today;

    document.getElementById(
      'toDate'
    ).min = today;

    document.getElementById(
      'fromDate'
    ).addEventListener(
      'change',
      function(){

        document.getElementById(
          'toDate'
        ).min = this.value;

      }
    );

    /* DATE FORMAT */

    function formatDate(dateString){

      const date =
        new Date(dateString);

      return date.toLocaleDateString(
        'en-GB',
        {

          day:'2-digit',
          month:'short',
          year:'numeric'

        }
      );

    }

    /* APPLY LEAVE */

    const leaveForm =
      document.getElementById(
        'leaveForm'
      );

    leaveForm.addEventListener(
      'submit',
      async function(e){

        e.preventDefault();

        const leave_type =
          document.getElementById(
            'leaveType'
          ).value;

        const from_date =
          document.getElementById(
            'fromDate'
          ).value;

        const to_date =
          document.getElementById(
            'toDate'
          ).value;

        const reason =
          document.getElementById(
            'reason'
          ).value;

        if(from_date > to_date){

          alert(
            'From Date cannot be after To Date'
          );

          return;

        }

        try{

          const response =
            await fetch(
              `${API}/apply-leave`,
              {

                method:'POST',

                headers:{
                  'Content-Type':
                  'application/json'
                },

                body:JSON.stringify({

                  user_id:user.id,
                  employee_name:user.full_name,
                  leave_type,
                  from_date,
                  to_date,
                  reason

                })

              }
            );

          const data =
            await response.json();

          alert(
            data.message
          );

          if(data.success){

            leaveForm.reset();

            loadLeaves();

            document.querySelector(
              '[data-section="historySection"]'
            ).click();

          }

        }

        catch(error){

          console.log(error);

          alert(
            'Cannot connect to backend'
          );

        }

      }
    );

    /* LOAD LEAVES */

    async function loadLeaves(){

      try{

        const response =
          await fetch(
            `${API}/my-leaves/${user.id}`
          );

        const leaves =
          await response.json();

        const tbody =
          document.getElementById(
            'leaveTableBody'
          );

        tbody.innerHTML = '';

        let total = 0;
        let approved = 0;
        let pending = 0;
        let rejected = 0;

        if(leaves.length === 0){

          tbody.innerHTML =
          `
          <tr>
            <td
              colspan="5"
              class="empty-message"
            >
              No Leave Applications Found
            </td>
          </tr>
          `;
        }

        leaves.forEach((leave) => {

          total++;

          if(
            leave.status === 'Approved'
          ){

            approved++;

          }

          else if(
            leave.status === 'Rejected'
          ){

            rejected++;

          }

          else{

            pending++;

          }

          let statusClass = '';

          if(
            leave.status === 'Approved'
          ){

            statusClass =
              'approved';

          }

          else if(
            leave.status === 'Rejected'
          ){

            statusClass =
              'rejected';

          }

          else{

            statusClass =
              'pending';

          }

          tbody.innerHTML +=
          `
          <tr>

            <td>
              ${leave.leave_type}
            </td>

            <td>
              ${formatDate(
                leave.from_date
              )}
            </td>

            <td>
              ${formatDate(
                leave.to_date
              )}
            </td>

            <td>
              ${leave.reason}
            </td>

            <td>

              <span
                class="status ${statusClass}"
              >

                ${leave.status}

              </span>

            </td>

          </tr>
          `;

        });

        document.getElementById(
          'totalLeaves'
        ).innerText =
          total;

        document.getElementById(
          'approvedLeaves'
        ).innerText =
          approved;

        document.getElementById(
          'pendingLeaves'
        ).innerText =
          pending;

        document.getElementById(
          'rejectedLeaves'
        ).innerText =
          rejected;

        document.getElementById(
          'notificationCount'
        ).innerText =
          pending;

      }

      catch(error){

        console.log(error);

      }

    }

    /* AUTO REFRESH */

    setInterval(() => {

      loadLeaves();

    }, 3000);

    /* INITIAL LOAD */

    loadLeaves();

  </script>

</body>

</html>
