<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    LeaveFlow HRMS - Login
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
      );

      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
    }

    .background-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:0.25;
    }

    .circle1{
      width:300px;
      height:300px;
      background:#ef4444;
      top:-80px;
      left:-80px;
    }

    .circle2{
      width:350px;
      height:350px;
      background:#3b82f6;
      bottom:-100px;
      right:-100px;
    }

    .container{
      position:relative;
      z-index:10;

      width:90%;
      max-width:1100px;

      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;

      align-items:center;
    }

    .left-section h1{
      font-size:4rem;
      line-height:1.1;
      margin-bottom:20px;
    }

    .left-section span{
      color:#ef4444;
    }

    .left-section p{
      color:#cbd5e1;
      line-height:1.8;
      margin-bottom:30px;
    }

    .features{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
    }

    .feature-box{
      padding:12px 18px;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      border-radius:12px;

      backdrop-filter:blur(10px);

      font-size:0.9rem;
    }

    .login-card{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(18px);

      padding:40px;

      border-radius:24px;

      box-shadow:
      0 15px 40px rgba(0,0,0,0.3);

    }

    .login-card h2{
      text-align:center;
      margin-bottom:10px;
      font-size:2rem;
    }

    .login-card p{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:30px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#e2e8f0;
    }

    .input-group input,
    .input-group select{

      width:100%;
      padding:14px;

      border:none;
      outline:none;

      border-radius:12px;

      background:
      rgba(255,255,255,0.1);

      color:white;

      font-size:0.95rem;
    }

    .input-group input::placeholder{
      color:#cbd5e1;
    }

    select option{
      color:black;
    }

    .login-btn{

      width:100%;
      padding:14px;

      background:
      linear-gradient(
        to right,
        #ef4444,
        #dc2626
      );

      border:none;
      border-radius:14px;

      color:white;

      font-size:1rem;
      font-weight:600;

      cursor:pointer;

      transition:0.3s;

      margin-top:10px;
    }

    .login-btn:hover{
      transform:translateY(-2px);

      box-shadow:
      0 8px 20px rgba(239,68,68,0.4);
    }

    .bottom-text{
      text-align:center;
      margin-top:20px;
      color:#cbd5e1;
    }

    .bottom-text a{
      color:#ef4444;
      text-decoration:none;
      font-weight:600;
    }

    @media(max-width:900px){

      .container{
        grid-template-columns:1fr;
      }

      .left-section{
        text-align:center;
      }

      .features{
        justify-content:center;
      }

      .left-section h1{
        font-size:3rem;
      }

    }

  </style>

</head>

<body>

  <div class="background-circle circle1"></div>

  <div class="background-circle circle2"></div>

  <div class="container">

    <!-- LEFT -->

    <div class="left-section">

      <h1>
        Leave<span>Flow</span><br>
        Management System
      </h1>

      <p>
        Smart leave management portal for employees and HR managers with leave approvals, notifications, and workflow tracking.
      </p>

      <div class="features">

        <div class="feature-box">
          Employee Dashboard
        </div>

        <div class="feature-box">
          HR Manager Panel
        </div>

        <div class="feature-box">
          Leave Tracking
        </div>

        <div class="feature-box">
          Real-Time Requests
        </div>

      </div>

    </div>

    <!-- LOGIN CARD -->

    <div class="login-card">

      <h2>
        Welcome Back
      </h2>

      <p>
        Login to continue
      </p>

      <form id="loginForm">

        <div class="input-group">

          <label>
            Email Address
          </label>

          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Password
          </label>

          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Login As
          </label>

          <select id="role" required>

            <option value="">
              Select Role
            </option>

            <option value="employee">
              Employee
            </option>

            <option value="manager">
              HR Manager
            </option>

          </select>

        </div>

        <button
          class="login-btn"
          type="submit"
        >

          Login To Dashboard

        </button>

      </form>

      <div class="bottom-text">

        New User?

        <a href="register.html">
          Register Here
        </a>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    const API =
      'http://localhost:5000';

    const loginForm =
      document.getElementById(
        'loginForm'
      );

    loginForm.addEventListener(
      'submit',
      async function(e){

        e.preventDefault();

        const email =
          document.getElementById(
            'email'
          ).value.trim();

        const password =
          document.getElementById(
            'password'
          ).value.trim();

        const role =
          document.getElementById(
            'role'
          ).value;

        if(
          !email ||
          !password ||
          !role
        ){

          alert(
            'Please fill all fields'
          );

          return;

        }

        try{

          const response =
            await fetch(
              `${API}/login`,
              {

                method:'POST',

                headers:{
                  'Content-Type':
                  'application/json'
                },

                body:JSON.stringify({

                  email,
                  password,
                  role

                })

              }
            );

          const data =
            await response.json();

          console.log(data);

          if(data.success){

            localStorage.setItem(
              'user',
              JSON.stringify(
                data.user
              )
            );

            alert(
              'Login Successful'
            );

            /* EMPLOYEE LOGIN */

            if(
              data.user.role ===
              'employee'
            ){

              window.location.href =
              'employee-dashboard.html';

            }

            /* MANAGER LOGIN */

            else if(
              data.user.role ===
              'manager'
            ){

              window.location.href =
              'manager-dashboard.html';

            }

            else{

              alert(
                'Invalid role found'
              );

            }

          }

          else{

            alert(
              data.message ||
              'Invalid Login'
            );

          }

        }

        catch(error){

          console.log(error);

          alert(
            'Cannot connect to server'
          );

        }

      }
    );

  </script>

</body>

</html>
