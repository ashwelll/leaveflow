<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Manager Dashboard - LeaveFlow HRMS
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
    }

    .sidebar{
      width:260px;
      background:#111827;
      padding:30px 20px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border-right:
      1px solid rgba(255,255,255,0.1);
    }

    .logo{
      font-size:2rem;
      font-weight:700;
      margin-bottom:40px;
    }

    .logo span{
      color:#ef4444;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu a{
      text-decoration:none;
      color:#cbd5e1;
      padding:14px;
      border-radius:12px;
      transition:0.3s;
      font-weight:500;
      cursor:pointer;
    }

    .menu a:hover,
    .menu a.active{
      background:#ef4444;
      color:white;
    }

    .logout-btn{
      padding:14px;
      background:#dc2626;
      border:none;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    .logout-btn:hover{
      background:#b91c1c;
    }

    .main-content{
      flex:1;
      padding:30px;
      overflow-y:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .welcome h1{
      font-size:2rem;
    }

    .welcome p{
      color:#94a3b8;
      margin-top:5px;
    }

    .cards{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(240px,1fr));

      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:#1e293b;
      padding:25px;
      border-radius:20px;
    }

    .card h3{
      color:#cbd5e1;
      margin-bottom:10px;
    }

    .card h1{
      font-size:2rem;
    }

    .section{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
    }

    .section h2{
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th,
    table td{
      padding:15px;
      text-align:left;
    }

    table th{
      color:#94a3b8;
      border-bottom:
      1px solid rgba(255,255,255,0.1);
    }

    table tr{
      border-bottom:
      1px solid rgba(255,255,255,0.05);
    }

    .status{
      padding:8px 14px;
      border-radius:20px;
      font-size:0.85rem;
      font-weight:600;
    }

    .pending{
      background:#facc15;
      color:black;
    }

    .approved{
      background:#22c55e;
    }

    .rejected{
      background:#ef4444;
    }

    .approve-btn{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      cursor:pointer;
      margin-right:8px;
      font-weight:600;
    }

    .reject-btn{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      background:#ef4444;
      color:white;
      cursor:pointer;
      font-weight:600;
    }

    .approve-btn:hover{
      background:#16a34a;
    }

    .reject-btn:hover{
      background:#dc2626;
    }

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
      }

      table{
        font-size:0.8rem;
      }

    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div>

      <div class="logo">
        Leave<span>Flow</span>
      </div>

      <div class="menu">

        <a class="active">
          Manager Dashboard
        </a>

      </div>

    </div>

    <button class="logout-btn">
      Logout
    </button>

  </div>

  <!-- MAIN -->

  <div class="main-content">

    <div class="topbar">

      <div class="welcome">

        <h1 id="welcomeText">
          Welcome Manager 👋
        </h1>

        <p>
          Review and manage employee leave requests.
        </p>

      </div>

    </div>

    <!-- CARDS -->

    <div class="cards">

      <div class="card">

        <h3>
          Total Requests
        </h3>

        <h1 id="totalLeaves">
          0
        </h1>

      </div>

      <div class="card">

        <h3>
          Pending
        </h3>

        <h1 id="pendingLeaves">
          0
        </h1>

      </div>

      <div class="card">

        <h3>
          Approved
        </h3>

        <h1 id="approvedLeaves">
          0
        </h1>

      </div>

      <div class="card">

        <h3>
          Rejected
        </h3>

        <h1 id="rejectedLeaves">
          0
        </h1>

      </div>

    </div>

    <!-- REQUEST TABLE -->

    <div class="section">

      <h2>
        Employee Leave Requests
      </h2>

      <table>

        <thead>

          <tr>

            <th>
              Employee
            </th>

            <th>
              Leave Type
            </th>

            <th>
              From Date
            </th>

            <th>
              To Date
            </th>

            <th>
              Reason
            </th>

            <th>
              Status
            </th>

            <th>
              Actions
            </th>

          </tr>

        </thead>

        <tbody id="managerTableBody">

        </tbody>

      </table>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    const API =
      'http://localhost:5000';

    const user =
      JSON.parse(
        localStorage.getItem('user')
      );

    /* USER CHECK */

    if(!user){

      window.location.href =
        'index.html';

    }

    /* FIX ROLE CHECK */

    const role =
      user.role.toLowerCase().trim();

    if(
      role !== 'manager' &&
      role !== 'hr manager'
    ){

      alert('Access Denied');

      window.location.href =
        'employee-dashboard.html';

    }

    /* WELCOME TEXT */

    document.getElementById(
      'welcomeText'
    ).innerHTML =
      `Welcome Manager, ${user.full_name} 👋`;

    /* LOGOUT */

    document.querySelector(
      '.logout-btn'
    ).addEventListener(
      'click',
      function(){

        localStorage.removeItem(
          'user'
        );

        window.location.href =
          'index.html';

      }
    );

    /* FORMAT DATE */

    function formatDate(dateString){

      const date =
        new Date(dateString);

      return date.toLocaleDateString(
        'en-GB',
        {

          day:'2-digit',
          month:'short',
          year:'numeric'

        }
      );

    }

    /* LOAD LEAVES */

    async function loadAllLeaves(){

      try{

        const response =
          await fetch(
            `${API}/all-leaves`
          );

        const data =
          await response.json();

        const leaves =
          data.leaves;

        const tbody =
          document.getElementById(
            'managerTableBody'
          );

        tbody.innerHTML = '';

        let total = 0;
        let approved = 0;
        let pending = 0;
        let rejected = 0;

        leaves.forEach((leave) => {

          total++;

          let statusClass =
            'pending';

          if(
            leave.status === 'Approved'
          ){

            approved++;
            statusClass =
              'approved';

          }

          else if(
            leave.status === 'Rejected'
          ){

            rejected++;
            statusClass =
              'rejected';

          }

          else{

            pending++;

          }

          tbody.innerHTML +=
          `
          <tr>

            <td>
              ${leave.employee_name || leave.full_name}
            </td>

            <td>
              ${leave.leave_type}
            </td>

            <td>
              ${formatDate(
                leave.from_date
              )}
            </td>

            <td>
              ${formatDate(
                leave.to_date
              )}
            </td>

            <td>
              ${leave.reason}
            </td>

            <td>

              <span
                class="status ${statusClass}"
              >

                ${leave.status}

              </span>

            </td>

            <td>

              ${
                leave.status === 'Pending'

                ?

                `
                <button
                  class="approve-btn"
                  onclick="approveLeave(${leave.id})"
                >
                  Approve
                </button>

                <button
                  class="reject-btn"
                  onclick="rejectLeave(${leave.id})"
                >
                  Reject
                </button>
                `

                :

                'Completed'
              }

            </td>

          </tr>
          `;

        });

        document.getElementById(
          'totalLeaves'
        ).innerText =
          total;

        document.getElementById(
          'approvedLeaves'
        ).innerText =
          approved;

        document.getElementById(
          'pendingLeaves'
        ).innerText =
          pending;

        document.getElementById(
          'rejectedLeaves'
        ).innerText =
          rejected;

      }

      catch(error){

        console.log(error);

        alert(
          'Cannot connect to backend'
        );

      }

    }

    /* APPROVE LEAVE */

    async function approveLeave(id){

      try{

        const response =
          await fetch(
            `${API}/approve-leave/${id}`,
            {

              method:'PUT'

            }
          );

        const data =
          await response.json();

        alert(data.message);

        loadAllLeaves();

      }

      catch(error){

        console.log(error);

      }

    }

    /* REJECT LEAVE */

    async function rejectLeave(id){

      try{

        const response =
          await fetch(
            `${API}/reject-leave/${id}`,
            {

              method:'PUT'

            }
          );

        const data =
          await response.json();

        alert(data.message);

        loadAllLeaves();

      }

      catch(error){

        console.log(error);

      }

    }

    /* INITIAL LOAD */

    loadAllLeaves();

  </script>

</body>

</html>
